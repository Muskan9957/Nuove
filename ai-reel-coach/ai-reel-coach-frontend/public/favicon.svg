<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F9A825"/>
      <stop offset="28%"  stop-color="#F06292"/>
      <stop offset="62%"  stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <filter id="fd" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#E040FB" flood-opacity="0.50"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#7C4DFF" flood-opacity="0.35"/>
    </filter>
    <pattern id="sp" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(-48)">
      <rect x="0" y="0" width="7" height="14" fill="rgba(0,0,0,0.20)"/>
      <rect x="7" y="0" width="7" height="14" fill="rgba(255,255,255,0.06)"/>
    </pattern>
    <clipPath id="cl"><rect x="12" y="36" width="76" height="14" rx="3"/></clipPath>
    <clipPath id="cu"><path d="M 12 36 L 88 22 L 88 11 L 12 25 Z"/></clipPath>
  </defs>

  <g filter="url(#fd)">
    <!-- Container -->
    <rect x="3" y="3" width="94" height="94" rx="22" fill="url(#bg)"/>
    <rect x="3" y="3" width="94" height="50" rx="22" fill="rgba(255,255,255,0.13)"/>
    <rect x="3" y="80" width="94" height="17" rx="22" fill="rgba(0,0,0,0.18)"/>

    <!-- Lower bar -->
    <rect x="12" y="36" width="76" height="14" rx="3" fill="rgba(255,255,255,0.93)"/>
    <rect x="12" y="36" width="76" height="14" fill="url(#sp)" clip-path="url(#cl)"/>
    <rect x="12" y="36" width="76" height="5"  rx="3" fill="rgba(255,255,255,0.45)"/>
    <line x1="12" y1="50" x2="88" y2="50" stroke="rgba(0,0,0,0.10)" stroke-width="1"/>

    <!-- Upper board -->
    <path d="M 12 36 L 88 22 L 88 11 L 12 25 Z" fill="rgba(255,255,255,0.88)"/>
    <path d="M 12 36 L 88 22 L 88 11 L 12 25 Z" fill="url(#sp)" clip-path="url(#cu)"/>
    <path d="M 12 25 L 88 11 L 88 14.5 L 12 28.5 Z" fill="rgba(255,255,255,0.50)"/>

    <!-- Hinge pin -->
    <circle cx="17" cy="30.5" r="4.5" fill="rgba(0,0,0,0.30)"/>
    <circle cx="17" cy="30.5" r="2.8" fill="rgba(255,255,255,0.92)"/>

    <!-- Play -->
    <path d="M 36 56 L 36 80 L 70 68 Z" fill="rgba(255,255,255,0.95)"/>
  </g>
</svg>
