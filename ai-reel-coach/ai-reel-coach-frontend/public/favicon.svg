<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Body: amber → magenta → violet (bottom-left to top-right) -->
    <linearGradient id="gb" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F9A825"/>
      <stop offset="30%"  stop-color="#F06292"/>
      <stop offset="65%"  stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <!-- Bars: neon cyan → electric indigo -->
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00E5FF"/>
      <stop offset="50%"  stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="fd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#7C3AED" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5"   flood-color="#00E5FF" flood-opacity="0.30"/>
    </filter>
    <!-- Stripe pattern -->
    <pattern id="sp" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(-48)">
      <rect x="0" y="0" width="7" height="14" fill="rgba(0,0,0,0.22)"/>
      <rect x="7" y="0" width="7" height="14" fill="rgba(255,255,255,0.07)"/>
    </pattern>
    <clipPath id="cl"><rect x="5" y="32" width="90" height="14" rx="4"/></clipPath>
    <clipPath id="cu"><path d="M 5 32 L 95 19 L 95 9 L 5 22 Z"/></clipPath>
  </defs>

  <g filter="url(#fd)">
    <!-- Body -->
    <rect x="5" y="44" width="90" height="52" rx="12" fill="url(#gb)"/>
    <!-- Inner top shine -->
    <rect x="5" y="44" width="90" height="26" rx="12" fill="rgba(255,255,255,0.18)"/>
    <!-- Bottom shadow -->
    <rect x="5" y="88" width="90" height="8"  rx="12" fill="rgba(0,0,0,0.18)"/>

    <!-- Lower clapper bar -->
    <rect x="5" y="32" width="90" height="14" rx="4" fill="url(#gc)"/>
    <rect x="5" y="32" width="90" height="14" fill="url(#sp)" clip-path="url(#cl)"/>
    <rect x="5" y="32" width="90" height="5"  rx="4" fill="rgba(255,255,255,0.28)"/>
    <line x1="5" y1="46" x2="95" y2="46" stroke="rgba(0,0,0,0.14)" stroke-width="1"/>

    <!-- Upper angled board -->
    <path d="M 5 32 L 95 19 L 95 9 L 5 22 Z" fill="url(#gc)"/>
    <path d="M 5 32 L 95 19 L 95 9 L 5 22 Z" fill="url(#sp)" clip-path="url(#cu)"/>
    <path d="M 5 22 L 95 9 L 95 12.5 L 5 25.5 Z" fill="rgba(255,255,255,0.30)"/>
    <path d="M 5 29.5 L 95 16.5 L 95 19 L 5 32 Z"  fill="rgba(0,0,0,0.12)"/>

    <!-- Hinge pin -->
    <circle cx="10" cy="27" r="4"   fill="rgba(0,0,0,0.35)"/>
    <circle cx="10" cy="27" r="2.5" fill="url(#gc)" opacity="0.95"/>
    <circle cx="9"  cy="26" r="1"   fill="rgba(255,255,255,0.70)"/>

    <!-- Play ▶ -->
    <path d="M 36 56 L 36 81 L 70 68.5 Z" fill="rgba(255,255,255,0.90)"/>
  </g>
</svg>
