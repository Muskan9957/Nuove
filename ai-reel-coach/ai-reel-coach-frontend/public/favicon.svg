<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="sp" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(-48)">
      <rect x="0" y="0" width="7" height="14" fill="rgba(0,0,0,0.22)"/>
      <rect x="7" y="0" width="7" height="14" fill="rgba(255,255,255,0.07)"/>
    </pattern>
    <clipPath id="cl"><rect x="5" y="32" width="90" height="14" rx="4"/></clipPath>
    <clipPath id="cu"><path d="M 5 32 L 95 19 L 95 9 L 5 22 Z"/></clipPath>
    <linearGradient id="gb" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#F9A825"/>
      <stop offset="30%"  stop-color="#F06292"/>
      <stop offset="65%"  stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00E5FF"/>
      <stop offset="50%"  stop-color="#40C4FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="gg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="40%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.10)"/>
    </linearGradient>
    <filter id="fd" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2"  flood-color="#000"    flood-opacity="0.40"/>
      <feDropShadow dx="0" dy="3" stdDeviation="5"  flood-color="#C2185B" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#7C4DFF" flood-opacity="0.40"/>
    </filter>
  </defs>

  <g filter="url(#fd)">
    <!-- Body -->
    <rect x="5" y="44" width="90" height="52" rx="12"
      fill="url(#gb)" stroke="rgba(255,255,255,0.30)" stroke-width="1.5"/>
    <rect x="5" y="44" width="90" height="28" rx="12" fill="url(#gg)"/>
    <rect x="5" y="88" width="90" height="8"  rx="12" fill="rgba(0,0,0,0.18)"/>

    <!-- Lower bar -->
    <rect x="5" y="32" width="90" height="14" rx="4"
      fill="url(#gc)" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
    <rect x="5" y="32" width="90" height="14" fill="url(#sp)" clip-path="url(#cl)"/>
    <rect x="5" y="32" width="90" height="5"  rx="4" fill="rgba(255,255,255,0.28)"/>
    <line x1="5" y1="46" x2="95" y2="46" stroke="rgba(0,0,0,0.14)" stroke-width="1"/>

    <!-- Upper board -->
    <path d="M 5 32 L 95 19 L 95 9 L 5 22 Z"
      fill="url(#gc)" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 5 32 L 95 19 L 95 9 L 5 22 Z" fill="url(#sp)" clip-path="url(#cu)"/>
    <path d="M 5 22 L 95 9 L 95 12.5 L 5 25.5 Z" fill="rgba(255,255,255,0.30)"/>

    <!-- Hinge pin -->
    <circle cx="10" cy="27" r="4"   fill="rgba(0,0,0,0.40)"/>
    <circle cx="10" cy="27" r="2.5" fill="url(#gc)" opacity="0.95"/>
    <circle cx="9"  cy="26" r="1"   fill="rgba(255,255,255,0.75)"/>

    <!-- Play -->
    <path d="M 36 56 L 36 81 L 70 68.5 Z" fill="rgba(255,255,255,0.95)"/>
  </g>
</svg>
